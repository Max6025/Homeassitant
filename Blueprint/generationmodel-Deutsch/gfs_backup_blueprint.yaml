blueprint:
  name: "GFS Backup – Täglich / Wöchentlich / Monatlich / Jährlich"
  description: >
    ## 💾 GFS Backup – 4 Ebenen (kein Addon nötig)

    Erstellt Backups über den **nativen HA Backup-Service**.
    Netzwerk-Speicher (NAS) wird automatisch bespielt wenn er unter
    Einstellungen → System → Speicher eingerichtet ist.

    ### Backup-Ebenen

    | Ebene          | Rhythmus    | Aufbewahrung |
    |----------------|-------------|--------------|
    | 🟢 Sohn        | Täglich     | einstellbar  |
    | 🔵 Vater       | Wöchentlich | einstellbar  |
    | 🟣 Großvater   | Monatlich   | einstellbar  |
    | 🔴 Urgroßvater | Jährlich    | einstellbar  |

    ### Lokales Löschen
    Pro Ebene einstellbar ob das Backup nach dem Erstellen
    lokal gelöscht wird (NAS bleibt Primärkopie) oder lokal bleibt.

    ### Optionale Helfer-Buttons
    Pro Ebene kann ein `input_button`-Helfer zugewiesen werden
    für manuellen sofortigen Trigger.

    ### Voraussetzung
    HA 2024.11+ für automatische Netzwerk-Speicher-Synchronisation.

  domain: automation
  input:

    # ══════════════════════════════════════════════════════════════
    # SOHN – TÄGLICH
    # ══════════════════════════════════════════════════════════════
    daily_section:
      name: "🟢 Sohn – Täglich"
      icon: mdi:calendar-today
      collapsed: false
      input:

        time_daily:
          name: "Uhrzeit"
          default: "03:00:00"
          selector:
            time:

        keep_daily:
          name: "Aufbewahrung lokal"
          description: "Wie viele tägliche Backups lokal behalten?"
          default: 7
          selector:
            number:
              min: 1
              max: 30
              unit_of_measurement: Stück
              mode: slider

        delete_local_daily:
          name: "Lokal löschen nach Upload"
          description: "Backup nach dem Erstellen lokal löschen (NAS behält die Kopie)"
          default: false
          selector:
            boolean:

        button_daily:
          name: "Helfer-Button (optional)"
          description: "input_button für manuellen Trigger – leer lassen wenn nicht gewünscht"
          default:
          selector:
            entity:
              domain: input_button

    # ══════════════════════════════════════════════════════════════
    # VATER – WÖCHENTLICH
    # ══════════════════════════════════════════════════════════════
    weekly_section:
      name: "🔵 Vater – Wöchentlich"
      icon: mdi:calendar-week
      collapsed: true
      input:

        time_weekly:
          name: "Uhrzeit"
          default: "04:00:00"
          selector:
            time:

        weekday_weekly:
          name: "Wochentag"
          default: sun
          selector:
            select:
              options:
                - label: Montag
                  value: mon
                - label: Dienstag
                  value: tue
                - label: Mittwoch
                  value: wed
                - label: Donnerstag
                  value: thu
                - label: Freitag
                  value: fri
                - label: Samstag
                  value: sat
                - label: Sonntag
                  value: sun

        keep_weekly:
          name: "Aufbewahrung lokal"
          description: "Wie viele wöchentliche Backups lokal behalten?"
          default: 4
          selector:
            number:
              min: 1
              max: 12
              unit_of_measurement: Stück
              mode: slider

        delete_local_weekly:
          name: "Lokal löschen nach Upload"
          description: "Backup nach dem Erstellen lokal löschen (NAS behält die Kopie)"
          default: false
          selector:
            boolean:

        button_weekly:
          name: "Helfer-Button (optional)"
          description: "input_button für manuellen Trigger – leer lassen wenn nicht gewünscht"
          default:
          selector:
            entity:
              domain: input_button

    # ══════════════════════════════════════════════════════════════
    # GROSSVATER – MONATLICH
    # ══════════════════════════════════════════════════════════════
    monthly_section:
      name: "🟣 Großvater – Monatlich"
      icon: mdi:calendar-month
      collapsed: true
      input:

        time_monthly:
          name: "Uhrzeit"
          default: "05:00:00"
          selector:
            time:

        day_monthly:
          name: "Tag des Monats"
          description: "An welchem Tag soll das monatliche Backup laufen? (1–28)"
          default: 1
          selector:
            number:
              min: 1
              max: 28
              mode: box

        keep_monthly:
          name: "Aufbewahrung lokal"
          description: "Wie viele monatliche Backups lokal behalten?"
          default: 12
          selector:
            number:
              min: 1
              max: 24
              unit_of_measurement: Stück
              mode: slider

        delete_local_monthly:
          name: "Lokal löschen nach Upload"
          description: "Backup nach dem Erstellen lokal löschen (NAS behält die Kopie)"
          default: false
          selector:
            boolean:

        button_monthly:
          name: "Helfer-Button (optional)"
          description: "input_button für manuellen Trigger – leer lassen wenn nicht gewünscht"
          default:
          selector:
            entity:
              domain: input_button

    # ══════════════════════════════════════════════════════════════
    # URGROSSVATER – JÄHRLICH
    # ══════════════════════════════════════════════════════════════
    yearly_section:
      name: "🔴 Urgroßvater – Jährlich"
      icon: mdi:calendar-star
      collapsed: true
      input:

        time_yearly:
          name: "Uhrzeit"
          default: "06:00:00"
          selector:
            time:

        day_yearly:
          name: "Tag des Monats"
          description: "An welchem Tag soll das Jahres-Backup laufen? (1–28)"
          default: 1
          selector:
            number:
              min: 1
              max: 28
              mode: box

        month_yearly:
          name: "Monat"
          description: "In welchem Monat soll das Jahres-Backup laufen?"
          default: "1"
          selector:
            select:
              options:
                - label: Januar
                  value: "1"
                - label: Februar
                  value: "2"
                - label: März
                  value: "3"
                - label: April
                  value: "4"
                - label: Mai
                  value: "5"
                - label: Juni
                  value: "6"
                - label: Juli
                  value: "7"
                - label: August
                  value: "8"
                - label: September
                  value: "9"
                - label: Oktober
                  value: "10"
                - label: November
                  value: "11"
                - label: Dezember
                  value: "12"

        keep_yearly:
          name: "Aufbewahrung lokal"
          description: "Wie viele Jahres-Backups lokal behalten?"
          default: 2
          selector:
            number:
              min: 1
              max: 10
              unit_of_measurement: Stück
              mode: slider

        delete_local_yearly:
          name: "Lokal löschen nach Upload"
          description: "Backup nach dem Erstellen lokal löschen (NAS behält die Kopie)"
          default: false
          selector:
            boolean:

        button_yearly:
          name: "Helfer-Button (optional)"
          description: "input_button für manuellen Trigger – leer lassen wenn nicht gewünscht"
          default:
          selector:
            entity:
              domain: input_button

# ── Variablen ─────────────────────────────────────────────────────
variables:
  var_day_monthly: !input day_monthly
  var_day_yearly: !input day_yearly
  var_month_yearly: !input month_yearly
  var_keep_daily: !input keep_daily
  var_keep_weekly: !input keep_weekly
  var_keep_monthly: !input keep_monthly
  var_keep_yearly: !input keep_yearly
  var_delete_daily: !input delete_local_daily
  var_delete_weekly: !input delete_local_weekly
  var_delete_monthly: !input delete_local_monthly
  var_delete_yearly: !input delete_local_yearly
  var_button_daily: !input button_daily
  var_button_weekly: !input button_weekly
  var_button_monthly: !input button_monthly
  var_button_yearly: !input button_yearly

# ── Trigger ───────────────────────────────────────────────────────
trigger:
  - platform: time
    at: !input time_daily
    id: trigger_daily

  - platform: time
    at: !input time_weekly
    id: trigger_weekly

  - platform: time
    at: !input time_monthly
    id: trigger_monthly

  - platform: time
    at: !input time_yearly
    id: trigger_yearly

  - platform: state
    entity_id: !input button_daily
    id: button_daily

  - platform: state
    entity_id: !input button_weekly
    id: button_weekly

  - platform: state
    entity_id: !input button_monthly
    id: button_monthly

  - platform: state
    entity_id: !input button_yearly
    id: button_yearly

# ── Aktionen ──────────────────────────────────────────────────────
action:
  - choose:

      # ── SOHN: Täglich ─────────────────────────────────────────
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: trigger_daily
              - condition: trigger
                id: button_daily
        sequence:
          - action: backup.create
            data:
              name: "HA-Daily-{{ now().strftime('%Y-%m-%d') }}"
          - delay:
              minutes: 2
          - action: backup.delete
            data:
              keep_last: "{{ var_keep_daily | int }}"
              name_filter: "HA-Daily-"
          - if:
              - condition: template
                value_template: "{{ var_delete_daily }}"
            then:
              - action: backup.delete
                data:
                  keep_last: 0
                  name_filter: "HA-Daily-{{ now().strftime('%Y-%m-%d') }}"

      # ── VATER: Wöchentlich ────────────────────────────────────
      - conditions:
          - condition: or
            conditions:
              - condition: and
                conditions:
                  - condition: trigger
                    id: trigger_weekly
                  - condition: time
                    weekday:
                      - !input weekday_weekly
              - condition: trigger
                id: button_weekly
        sequence:
          - action: backup.create
            data:
              name: "HA-Weekly-{{ now().strftime('%Y-%m-%d') }}"
          - delay:
              minutes: 2
          - action: backup.delete
            data:
              keep_last: "{{ var_keep_weekly | int }}"
              name_filter: "HA-Weekly-"
          - if:
              - condition: template
                value_template: "{{ var_delete_weekly }}"
            then:
              - action: backup.delete
                data:
                  keep_last: 0
                  name_filter: "HA-Weekly-{{ now().strftime('%Y-%m-%d') }}"

      # ── GROSSVATER: Monatlich ─────────────────────────────────
      - conditions:
          - condition: or
            conditions:
              - condition: and
                conditions:
                  - condition: trigger
                    id: trigger_monthly
                  - condition: template
                    value_template: "{{ now().day == var_day_monthly | int }}"
              - condition: trigger
                id: button_monthly
        sequence:
          - action: backup.create
            data:
              name: "HA-Monthly-{{ now().strftime('%Y-%m') }}"
          - delay:
              minutes: 2
          - action: backup.delete
            data:
              keep_last: "{{ var_keep_monthly | int }}"
              name_filter: "HA-Monthly-"
          - if:
              - condition: template
                value_template: "{{ var_delete_monthly }}"
            then:
              - action: backup.delete
                data:
                  keep_last: 0
                  name_filter: "HA-Monthly-{{ now().strftime('%Y-%m') }}"

      # ── URGROSSVATER: Jährlich ────────────────────────────────
      - conditions:
          - condition: or
            conditions:
              - condition: and
                conditions:
                  - condition: trigger
                    id: trigger_yearly
                  - condition: template
                    value_template: >
                      {{ now().day == var_day_yearly | int and
                         now().month == var_month_yearly | int }}
              - condition: trigger
                id: button_yearly
        sequence:
          - action: backup.create
            data:
              name: "HA-Yearly-{{ now().strftime('%Y') }}"
          - delay:
              minutes: 2
          - action: backup.delete
            data:
              keep_last: "{{ var_keep_yearly | int }}"
              name_filter: "HA-Yearly-"
          - if:
              - condition: template
                value_template: "{{ var_delete_yearly }}"
            then:
              - action: backup.delete
                data:
                  keep_last: 0
                  name_filter: "HA-Yearly-{{ now().strftime('%Y') }}"

mode: parallel
max: 4
