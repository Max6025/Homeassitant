blueprint:
  name: "GFS Backup – Täglich / Wöchentlich / Monatlich / Jährlich"
  description: >
    ## 💾 GFS Backup – 4 Ebenen (kein Addon nötig)

    Erstellt Backups über den **nativen HA Netzwerk-Speicher** (CIFS/Samba).
    Voraussetzung: Netzwerk-Speicher unter Einstellungen → System → Speicher eingerichtet.

    ### Backup-Ebenen

    | Ebene        | Rhythmus   | Aufbewahrung |
    |--------------|------------|--------------|
    | 🟢 Sohn      | Täglich    | 7 Tage       |
    | 🔵 Vater     | Wöchentlich| 4 Wochen     |
    | 🟣 Großvater | Monatlich  | 12 Monate    |
    | 🔴 Urgroßvater | Jährlich | 2 Jahre      |

    ### Optionale Helfer-Buttons
    Jedem Backup kann ein `input_button`-Helfer zugewiesen werden –
    bei Betätigung wird das jeweilige Backup sofort manuell ausgelöst.

  domain: automation
  input:

    # ── Zeitpläne ─────────────────────────────────────────────────
    time_daily:
      name: "Uhrzeit – Täglich (Sohn)"
      default: "03:00:00"
      selector:
        time:

    time_weekly:
      name: "Uhrzeit – Wöchentlich (Vater)"
      default: "04:00:00"
      selector:
        time:

    weekday_weekly:
      name: "Wochentag – Wöchentlich"
      default: sun
      selector:
        select:
          options:
            - label: Montag
              value: mon
            - label: Dienstag
              value: tue
            - label: Mittwoch
              value: wed
            - label: Donnerstag
              value: thu
            - label: Freitag
              value: fri
            - label: Samstag
              value: sat
            - label: Sonntag
              value: sun

    time_monthly:
      name: "Uhrzeit – Monatlich (Großvater)"
      default: "05:00:00"
      selector:
        time:

    day_monthly:
      name: "Tag des Monats – Monatlich"
      description: "1–28, wann soll das monatliche Backup laufen?"
      default: 1
      selector:
        number:
          min: 1
          max: 28
          mode: box

    time_yearly:
      name: "Uhrzeit – Jährlich (Urgroßvater)"
      default: "06:00:00"
      selector:
        time:

    day_yearly:
      name: "Tag – Jährlich"
      description: "Tag des Monats für das Jahres-Backup (1–28)"
      default: 1
      selector:
        number:
          min: 1
          max: 28
          mode: box

    month_yearly:
      name: "Monat – Jährlich"
      default: 1
      selector:
        select:
          options:
            - label: Januar
              value: "1"
            - label: Februar
              value: "2"
            - label: März
              value: "3"
            - label: April
              value: "4"
            - label: Mai
              value: "5"
            - label: Juni
              value: "6"
            - label: Juli
              value: "7"
            - label: August
              value: "8"
            - label: September
              value: "9"
            - label: Oktober
              value: "10"
            - label: November
              value: "11"
            - label: Dezember
              value: "12"

    # ── Aufbewahrung ──────────────────────────────────────────────
    keep_daily:
      name: "Aufbewahrung – Täglich"
      default: 7
      selector:
        number:
          min: 1
          max: 30
          unit_of_measurement: Tage
          mode: slider

    keep_weekly:
      name: "Aufbewahrung – Wöchentlich"
      default: 4
      selector:
        number:
          min: 1
          max: 12
          unit_of_measurement: Wochen
          mode: slider

    keep_monthly:
      name: "Aufbewahrung – Monatlich"
      default: 12
      selector:
        number:
          min: 1
          max: 24
          unit_of_measurement: Monate
          mode: slider

    keep_yearly:
      name: "Aufbewahrung – Jährlich"
      default: 2
      selector:
        number:
          min: 1
          max: 10
          unit_of_measurement: Jahre
          mode: slider

    # ── Optionale Helfer-Buttons ──────────────────────────────────
    button_daily:
      name: "Helfer-Button – Täglich (optional)"
      description: "input_button Helfer für manuellen täglichen Trigger. Leer lassen wenn nicht gewünscht."
      default:
      selector:
        entity:
          domain: input_button

    button_weekly:
      name: "Helfer-Button – Wöchentlich (optional)"
      description: "input_button Helfer für manuellen wöchentlichen Trigger. Leer lassen wenn nicht gewünscht."
      default:
      selector:
        entity:
          domain: input_button

    button_monthly:
      name: "Helfer-Button – Monatlich (optional)"
      description: "input_button Helfer für manuellen monatlichen Trigger. Leer lassen wenn nicht gewünscht."
      default:
      selector:
        entity:
          domain: input_button

    button_yearly:
      name: "Helfer-Button – Jährlich (optional)"
      description: "input_button Helfer für manuellen jährlichen Trigger. Leer lassen wenn nicht gewünscht."
      default:
      selector:
        entity:
          domain: input_button

# ── Variablen ─────────────────────────────────────────────────────
variables:
  var_day_monthly: !input day_monthly
  var_day_yearly: !input day_yearly
  var_month_yearly: !input month_yearly
  var_keep_daily: !input keep_daily
  var_keep_weekly: !input keep_weekly
  var_keep_monthly: !input keep_monthly
  var_keep_yearly: !input keep_yearly
  var_button_daily: !input button_daily
  var_button_weekly: !input button_weekly
  var_button_monthly: !input button_monthly
  var_button_yearly: !input button_yearly

# ── Trigger ───────────────────────────────────────────────────────
trigger:
  - platform: time
    at: !input time_daily
    id: trigger_daily

  - platform: time
    at: !input time_weekly
    id: trigger_weekly

  - platform: time
    at: !input time_monthly
    id: trigger_monthly

  - platform: time
    at: !input time_yearly
    id: trigger_yearly

  - platform: state
    entity_id: !input button_daily
    id: button_daily

  - platform: state
    entity_id: !input button_weekly
    id: button_weekly

  - platform: state
    entity_id: !input button_monthly
    id: button_monthly

  - platform: state
    entity_id: !input button_yearly
    id: button_yearly

# ── Aktionen ──────────────────────────────────────────────────────
action:
  - choose:

      # ── SOHN: Täglich ─────────────────────────────────────────
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: trigger_daily
              - condition: trigger
                id: button_daily
        sequence:
          - action: backup.create
            data:
              name: "HA-Daily-{{ now().strftime('%Y-%m-%d') }}"
          - delay:
              minutes: 2
          - action: backup.delete
            data:
              keep_last: "{{ var_keep_daily | int }}"
              name_filter: "HA-Daily-"

      # ── VATER: Wöchentlich ────────────────────────────────────
      - conditions:
          - condition: or
            conditions:
              - condition: and
                conditions:
                  - condition: trigger
                    id: trigger_weekly
                  - condition: time
                    weekday:
                      - !input weekday_weekly
              - condition: trigger
                id: button_weekly
        sequence:
          - action: backup.create
            data:
              name: "HA-Weekly-{{ now().strftime('%Y-%m-%d') }}"
          - delay:
              minutes: 2
          - action: backup.delete
            data:
              keep_last: "{{ var_keep_weekly | int }}"
              name_filter: "HA-Weekly-"

      # ── GROSSVATER: Monatlich ─────────────────────────────────
      - conditions:
          - condition: or
            conditions:
              - condition: and
                conditions:
                  - condition: trigger
                    id: trigger_monthly
                  - condition: template
                    value_template: "{{ now().day == var_day_monthly | int }}"
              - condition: trigger
                id: button_monthly
        sequence:
          - action: backup.create
            data:
              name: "HA-Monthly-{{ now().strftime('%Y-%m') }}"
          - delay:
              minutes: 2
          - action: backup.delete
            data:
              keep_last: "{{ var_keep_monthly | int }}"
              name_filter: "HA-Monthly-"

      # ── URGROSSVATER: Jährlich ────────────────────────────────
      - conditions:
          - condition: or
            conditions:
              - condition: and
                conditions:
                  - condition: trigger
                    id: trigger_yearly
                  - condition: template
                    value_template: >
                      {{ now().day == var_day_yearly | int and
                         now().month == var_month_yearly | int }}
              - condition: trigger
                id: button_yearly
        sequence:
          - action: backup.create
            data:
              name: "HA-Yearly-{{ now().strftime('%Y') }}"
          - delay:
              minutes: 2
          - action: backup.delete
            data:
              keep_last: "{{ var_keep_yearly | int }}"
              name_filter: "HA-Yearly-"

mode: parallel
max: 4
